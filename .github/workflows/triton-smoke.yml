name: Triton Smoke

on:
  workflow_dispatch:
    inputs:
      onnx_url:
        description: Optional ONNX or zipped ONNX SDK URL to test with Triton
        required: false
        type: string
      model_name:
        description: Triton model name
        required: false
        default: rtmpose
        type: string
      pose_input_name:
        description: Triton model input name
        required: false
        default: image
        type: string
      pose_output_name:
        description: Triton model output name
        required: false
        default: keypoints
        type: string

permissions:
  contents: read

env:
  TRITON_IMAGE: nvcr.io/nvidia/tritonserver:24.12-py3

jobs:
  empty-triton-startup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ inputs.onnx_url == '' }}
    steps:
      - name: Start published Triton image without ONNX
        run: |
          mkdir -p models-empty
          docker run -d --name triton-empty \
            -p 8000:8000 \
            -v "$PWD/models-empty:/models-empty:ro" \
            "$TRITON_IMAGE" \
            tritonserver --model-repository=/models-empty --strict-readiness=false

          triton_live=0
          for i in $(seq 1 120); do
            if ! docker ps --format '{{.Names}}' | grep -qx triton-empty; then
              echo "Triton container exited before health/live became available."
              docker logs triton-empty || true
              exit 1
            fi
            if curl -fsS http://localhost:8000/v2/health/live; then
              triton_live=1
              break
            fi
            sleep 2
          done
          if [ "${triton_live}" != "1" ]; then
            echo "Triton did not expose health/live before timeout."
            docker ps -a
            docker logs triton-empty || true
            exit 1
          fi
      - name: Stop Triton
        if: always()
        run: docker rm -f triton-empty || true

  onnx-triton-startup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ inputs.onnx_url != '' }}
    steps:
      - name: Prepare ONNX model repository
        env:
          RTMPOSE_ONNX_URL: ${{ inputs.onnx_url }}
          POSE_MODEL_NAME: ${{ inputs.model_name }}
          POSE_INPUT_NAME: ${{ inputs.pose_input_name }}
          POSE_OUTPUT_NAME: ${{ inputs.pose_output_name }}
        run: |
          set -euo pipefail
          mkdir -p "models-runtime/${POSE_MODEL_NAME}/1" /tmp/rtmpose-download
          wget -O /tmp/rtmpose-download/artifact "${RTMPOSE_ONNX_URL}"

          if echo "${RTMPOSE_ONNX_URL}" | grep -Eiq '\.zip($|[?#])'; then
            mkdir -p /tmp/rtmpose-download/unzipped
            unzip -q /tmp/rtmpose-download/artifact -d /tmp/rtmpose-download/unzipped
            found_onnx="$(find /tmp/rtmpose-download/unzipped -type f -name '*.onnx' | sort | head -n 1 || true)"
            if [ -z "${found_onnx}" ]; then
              echo "No .onnx file found in zipped SDK artifact."
              find /tmp/rtmpose-download/unzipped -maxdepth 5 -type f -print || true
              exit 1
            fi
            cp "${found_onnx}" "models-runtime/${POSE_MODEL_NAME}/1/model.onnx"
          else
            cp /tmp/rtmpose-download/artifact "models-runtime/${POSE_MODEL_NAME}/1/model.onnx"
          fi

          ls -lh "models-runtime/${POSE_MODEL_NAME}/1/model.onnx"
          cat > "models-runtime/${POSE_MODEL_NAME}/config.pbtxt" <<EOF
          name: "${POSE_MODEL_NAME}"
          platform: "onnxruntime_onnx"
          max_batch_size: 0
          input [
            {
              name: "${POSE_INPUT_NAME}"
              data_type: TYPE_UINT8
              dims: [1, -1, -1, 3]
            }
          ]
          output [
            {
              name: "${POSE_OUTPUT_NAME}"
              data_type: TYPE_FP32
              dims: [1, 17, 3]
            }
          ]
          EOF
          cat "models-runtime/${POSE_MODEL_NAME}/config.pbtxt"
          find models-runtime -maxdepth 5 -type f -print

      - name: Start published Triton image with ONNX model repository
        env:
          POSE_MODEL_NAME: ${{ inputs.model_name }}
        run: |
          docker run -d --name triton-onnx \
            -p 8000:8000 \
            -v "$PWD/models-runtime:/models-runtime:ro" \
            "$TRITON_IMAGE" \
            tritonserver --model-repository=/models-runtime --strict-readiness=false

          triton_live=0
          for i in $(seq 1 300); do
            if ! docker ps --format '{{.Names}}' | grep -qx triton-onnx; then
              echo "Triton container exited before health/live became available."
              docker ps -a
              docker logs triton-onnx || true
              find models-runtime -maxdepth 5 -type f -print || true
              exit 1
            fi
            if curl -fsS http://localhost:8000/v2/health/live; then
              triton_live=1
              break
            fi
            if [ $((i % 30)) -eq 0 ]; then
              echo "Waiting for Triton health/live... attempt ${i}/300"
              docker logs --tail 80 triton-onnx || true
            fi
            sleep 2
          done

          if [ "${triton_live}" != "1" ]; then
            echo "Triton did not expose health/live before timeout."
            docker ps -a
            docker logs triton-onnx || true
            exit 1
          fi

          curl -fsS http://localhost:8000/v2/models/${POSE_MODEL_NAME}/ready || {
            echo "Triton is live, but model is not ready."
            curl -fsS http://localhost:8000/v2/models/${POSE_MODEL_NAME} || true
            docker logs triton-onnx || true
            exit 1
          }
      - name: Show Triton logs
        if: always()
        run: docker logs triton-onnx || true
      - name: Stop Triton
        if: always()
        run: docker rm -f triton-onnx || true

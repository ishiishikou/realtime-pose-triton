name: RTMPose ONNX Export

on:
  workflow_dispatch:
    inputs:
      checkpoint_url:
        description: RTMPose checkpoint URL
        required: true
        type: string
      mmdeploy_ref:
        description: MMDeploy git ref
        required: false
        default: main
        type: string
      mmpose_ref:
        description: MMPose git ref
        required: false
        default: main
        type: string

permissions:
  contents: read

jobs:
  export-onnx:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install base tools
        run: |
          python -m pip install --upgrade pip
          pip install openmim
      - name: Clone OpenMMLab repositories
        run: |
          git clone --depth 1 --branch "${{ inputs.mmdeploy_ref }}" https://github.com/open-mmlab/mmdeploy.git ../mmdeploy
          git clone --depth 1 --branch "${{ inputs.mmpose_ref }}" https://github.com/open-mmlab/mmpose.git ../mmpose
      - name: Install OpenMMLab packages
        working-directory: ../mmpose
        run: |
          mim install mmengine
          mim install "mmcv>=2.0.0"
          pip install -r requirements.txt
          pip install -v -e .
          cd ../mmdeploy
          pip install -r requirements/runtime.txt
          pip install -v -e .
      - name: Export ONNX on CPU
        env:
          CHECKPOINT_PATH: ${{ inputs.checkpoint_url }}
          MMDEPLOY_DIR: ../mmdeploy
          MMPOSE_DIR: ../mmpose
          WORK_DIR: rtmpose-ort/rtmpose-m
          OUTPUT_PATH: models/rtmpose/1/model.onnx
        run: bash scripts/export-rtmpose-onnx.sh
      - name: Inspect generated ONNX
        run: |
          python -m pip install onnx
          python - <<'PY'
          import onnx
          model = onnx.load('models/rtmpose/1/model.onnx')
          print('inputs:')
          for value in model.graph.input:
              print(value.name, value.type)
          print('outputs:')
          for value in model.graph.output:
              print(value.name, value.type)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: rtmpose-model-onnx
          path: models/rtmpose/1/model.onnx
          if-no-files-found: error

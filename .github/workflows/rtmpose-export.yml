name: RTMPose ONNX Export

on:
  workflow_dispatch:
    inputs:
      checkpoint_url:
        description: RTMPose checkpoint URL
        required: true
        default: https://download.openmmlab.com/mmpose/v1/projects/rtmposev1/rtmpose-t_simcc-body7_pt-body7_420e-256x192-026a1439_20230504.pth
        type: string
      mmdeploy_ref:
        description: MMDeploy git ref
        required: false
        default: main
        type: string
      mmpose_ref:
        description: MMPose git ref
        required: false
        default: main
        type: string

permissions:
  contents: read

jobs:
  export-onnx:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install base tools
        run: |
          python -m pip install --upgrade pip
          # Keep the export stack on a PyTorch version that has OpenMMLab CPU wheels.
          # The latest CPU PyTorch can make MIM look for a wheel path that does not
          # exist yet, which falls back to a slow and brittle mmcv source build.
          pip install "setuptools<70" wheel
          pip install torch==2.1.2 torchvision==0.16.2 --index-url https://download.pytorch.org/whl/cpu
          pip install openmim
          python - <<'PY'
          import torch
          print('torch:', torch.__version__)
          print('cuda available:', torch.cuda.is_available())
          print('torch cuda:', torch.version.cuda)
          PY
      - name: Clone OpenMMLab repositories
        run: |
          git clone --depth 1 --branch "${{ inputs.mmdeploy_ref }}" https://github.com/open-mmlab/mmdeploy.git ../mmdeploy
          git clone --depth 1 --branch "${{ inputs.mmpose_ref }}" https://github.com/open-mmlab/mmpose.git ../mmpose
      - name: Install OpenMMLab packages
        working-directory: ../mmpose
        run: |
          mim install mmengine
          mim install "mmcv==2.1.0"
          # RTMPose export does not need chumpy. The upstream full runtime
          # requirements include chumpy, whose legacy build is brittle on modern
          # isolated pip builds, so install runtime dependencies except chumpy.
          grep -v -E '^chumpy($|[<=> ])' requirements/runtime.txt > /tmp/mmpose-runtime-no-chumpy.txt
          pip install -r /tmp/mmpose-runtime-no-chumpy.txt
          pip install --no-build-isolation --no-deps -v -e .
          cd ../mmdeploy
          pip install -r requirements/runtime.txt
          pip install --no-build-isolation --no-deps -v -e .
      - name: Export ONNX on CPU
        env:
          CHECKPOINT_PATH: ${{ inputs.checkpoint_url }}
          MMDEPLOY_DIR: ../mmdeploy
          MMPOSE_DIR: ../mmpose
          WORK_DIR: rtmpose-ort/rtmpose-m
          OUTPUT_PATH: models/rtmpose/1/model.onnx
        run: bash scripts/export-rtmpose-onnx.sh
      - name: Inspect generated ONNX
        run: |
          python -m pip install onnx
          python - <<'PY'
          import onnx
          model = onnx.load('models/rtmpose/1/model.onnx')
          print('inputs:')
          for value in model.graph.input:
              print(value.name, value.type)
          print('outputs:')
          for value in model.graph.output:
              print(value.name, value.type)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: rtmpose-model-onnx
          path: models/rtmpose/1/model.onnx
          if-no-files-found: error

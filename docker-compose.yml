name: realtime-pose-triton

services:
  web:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_WEBRTC_CONFIG: ${VITE_WEBRTC_CONFIG:-}
    ports:
      - "5173:80"

  backend:
    build: ./backend
    environment:
      TRITON_GRPC_URL: triton:8001
      POSE_MODEL_NAME: ${POSE_MODEL_NAME:-rtmpose}
      POSE_INPUT_NAME: ${POSE_INPUT_NAME:-image}
      POSE_OUTPUT_NAME: ${POSE_OUTPUT_NAME:-keypoints}
      POSE_TARGET_FPS: ${POSE_TARGET_FPS:-10}
      POSE_MOCK_MODE: ${POSE_MOCK_MODE:-1}
    ports:
      - "8080:8080"

  triton:
    build:
      context: .
      dockerfile: triton.Dockerfile
    environment:
      POSE_MODEL_NAME: ${POSE_MODEL_NAME:-rtmpose}
      POSE_INPUT_NAME: ${POSE_INPUT_NAME:-image}
      POSE_OUTPUT_NAME: ${POSE_OUTPUT_NAME:-keypoints}
      RTMPOSE_ONNX_URL: ${RTMPOSE_ONNX_URL:-}
      RTMPOSE_ONNX_PATH: ${RTMPOSE_ONNX_PATH:-/models/rtmpose/1/model.onnx}
    volumes:
      - ./models:/models
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
